version: "3.9"

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: food_delivery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: food_delivery
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d food_delivery"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Go Backend
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: food_delivery_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: food_delivery
      DB_SSLMODE: disable
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
